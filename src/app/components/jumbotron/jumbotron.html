<section class="jumbo">
      <div class="jumbo-content">
        <h1 class="title">{{ title() }}</h1>
        <p class="lead">{{ lead() }}</p>
        <button class="cta">{{ cta() }}</button>
      </div>
      <div class="jumbo-media">
        <img [src]="image()" [alt]="alt()" class="media-img" />
      </div>
    </section>
